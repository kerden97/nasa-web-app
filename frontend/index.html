<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preload" as="image" href="/home/hero-nebula.webp" fetchpriority="high" />
    <link rel="preload" as="font" href="/fonts/Nasa.woff" type="font/woff" crossorigin />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" />
    <script>
      ;(() => {
        const storedTheme = localStorage.getItem('theme')
        const theme = storedTheme === 'light' ? 'light' : 'dark'
        const root = document.documentElement

        root.classList.toggle('dark', theme === 'dark')
        root.style.colorScheme = theme
        root.style.backgroundColor = theme === 'dark' ? '#020617' : '#f8fafc'
      })()
    </script>
    <meta
      name="description"
      content="Explore space data from NASA — astronomy pictures, image archives, and Earth imagery."
    />
    <title>Home & Beyond</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
